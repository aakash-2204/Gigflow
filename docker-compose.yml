version: "3.8"

services:
  backend:
    build: ./backend
    container_name: gigflow-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    restart: always

  frontend:
    build: ./frontend
    container_name: gigflow-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: always